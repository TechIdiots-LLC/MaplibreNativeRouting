name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version-check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version:   ${{ steps.check.outputs.version }}
      published: ${{ steps.check.outputs.published }}

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION and check GitHub releases
        id: check
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "published=true"  >> "$GITHUB_OUTPUT"
            echo "Already released — skipping build."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Not yet released — proceeding."
          fi

  # ── Build & pack (Windows required for MAUI WinUI target) ────────────────
  pack:
    name: Pack NuGet
    runs-on: windows-latest
    needs: version-check
    if: needs.version-check.outputs.published == 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore MAUI workload
        run: dotnet workload install maui

      - name: Pack MaplibreNative.Routing.Core
        run: |
          dotnet pack core/MaplibreNative.Routing.Core.csproj `
            -c Release `
            -p:Version=${{ needs.version-check.outputs.version }} `
            -o artifacts/

      - name: Pack MaplibreNative.Routing
        run: |
          dotnet pack handlers/MaplibreNative.Routing.csproj `
            -c Release `
            -p:Version=${{ needs.version-check.outputs.version }} `
            -o artifacts/

      - name: Pack MaplibreNative.Routing.Wpf
        run: |
          dotnet pack wpf/MaplibreNative.Routing.Wpf.csproj `
            -c Release `
            -p:Version=${{ needs.version-check.outputs.version }} `
            -o artifacts/

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          retention-days: 7

  # ── GitHub Release + NuGet publish ───────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [version-check, pack]
    if: needs.version-check.outputs.published == 'false'
    environment: release

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK (for nuget push)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/

      - name: Extract changelog for version
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="## $VERSION" \
              'BEGIN{p=0} $0==ver{p=1;next} /^## /&&p{exit} p{print}' \
              CHANGELOG.md > release-notes.md
          else
            echo "Release v${VERSION}." > release-notes.md
          fi
          cat release-notes.md

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag:          v${{ needs.version-check.outputs.version }}
          name:         v${{ needs.version-check.outputs.version }}
          bodyFile:     release-notes.md
          artifacts:    "artifacts/*.nupkg"
          draft:        false
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push NuGet packages to NuGet.org
        run: |
          EXIT_CODE=0
          for pkg in artifacts/*.nupkg; do
            echo "Pushing $pkg..."
            if dotnet nuget push "$pkg" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate; then
              echo "✓ Successfully pushed or already exists: $(basename $pkg)"
            else
              echo "✗ FAILED to push: $(basename $pkg)"
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE
